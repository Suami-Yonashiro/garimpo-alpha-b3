# Tema do dashboard (PRD secao 12): base CLARA contemporanea + cor com funcao.
# Base neutra clara; cores semanticas (verde=oportunidade, ambar=neutro, vermelho=risco)
# ficam reservadas aos dados; o accent (indigo) e so para a interface.
[theme]
base = "light"
primaryColor = "#4F46E5"               # indigo — accent da interface
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F1F5F9"   # slate-100 (cards, tabela)
textColor = "#0F172A"                   # slate-900
font = "sans serif"

[browser]
gatherUsageStats = false
